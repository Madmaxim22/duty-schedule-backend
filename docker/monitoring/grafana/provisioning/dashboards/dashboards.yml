apiVersion: 1

providers:
  - name: Duty
    orgId: 1
    folder: Duty
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json

  - name: Community
    orgId: 1
    folder: Community
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/community
