# Статика MkDocs (docs.duty-w.ru) — только внутри Docker-сети duty-proxy.
# Порт наружу не публикуется; доступ через NPM + Basic Auth.
#
# На NAS (после git pull):
#   cd .../duty-schedule-backend/docker/docs
#   mkdir -p site
#   docker compose up -d
#
# Обновление site/ с ПК: scripts/deploy-docs-to-nas.ps1
# Подробности: docs/deployment/docs-site.md (в репозитории Duty)

services:
  docs:
    image: nginx:alpine
    container_name: duty-docs
    restart: unless-stopped
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - duty-proxy

networks:
  duty-proxy:
    external: true
