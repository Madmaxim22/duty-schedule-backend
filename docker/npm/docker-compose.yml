# Nginx Proxy Manager — reverse proxy + Let's Encrypt для Duty на OMV.
# Развёртывание на NAS (рядом со стеком Duty):
#   docker network create duty-proxy   # один раз
#   cd /srv/.../docker/npm
#   docker compose up -d
# Админка: http://<IP_NAS>:81 (не открывать :81 в интернет)
# Proxy Host → duty-nginx:80 (не 127.0.0.1:8080 — NPM в отдельном контейнере)
# Подробности: README.md

services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
      # Лимит загрузки для всех Proxy Host (фото профиля и т.д.)
      - ./custom/server_proxy.conf:/data/nginx/custom/server_proxy.conf:ro
    networks:
      - duty-proxy

networks:
  duty-proxy:
    external: true
